name: Naver News Scraper

on:
  schedule:
    - cron: '42 * * * *'
  workflow_dispatch:

concurrency:
  group: news-scraper
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  create-news-issue:
    name: Create News Issue
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Set Up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Check Environment
        run: |
          echo "Checking environment..."
          java -version
          echo "NEWS_QUERY: ${NEWS_QUERY}"
          echo "NEWS_DISPLAY: ${NEWS_DISPLAY}"
          echo "Environment check completed"
        env:
          NEWS_QUERY: ${{ vars.NEWS_QUERY }}
          NEWS_DISPLAY: ${{ vars.NEWS_DISPLAY }}

      - name: Compile Sources
        run: |
          echo "Compiling sources..."
          javac -d out $(find src/oop -name '*.java')
          class_count=$(find out -name '*.class' | wc -l | tr -d ' ')
          echo "Compile completed: ${class_count} classes"

      - name: Create News Issue
        run: |
          echo "Starting news collection and issue creation..."
          java -cp out oop.search.presentation.GitHubNewsApp
          echo "Issue creation finished"
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEWS_QUERY: ${{ vars.NEWS_QUERY }}
          NEWS_DISPLAY: ${{ vars.NEWS_DISPLAY }}
          NEWS_CATEGORY: ${{ vars.NEWS_CATEGORY }}
